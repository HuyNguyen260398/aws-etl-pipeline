name: Terraform check

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-check.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-24.04
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME }}
      TF_VAR_environment: dev
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_private_subnet_cidrs: ${{ vars.PRIVATE_SUBNET_CIDRS_JSON }}
      TF_VAR_nat_public_subnet_cidr: ${{ vars.NAT_PUBLIC_SUBNET_CIDR }}
      TF_VAR_s3_endpoint_allowed_bucket_arns: ${{ vars.S3_ENDPOINT_ALLOWED_BUCKET_ARNS_JSON }}
      TF_VAR_s3_endpoint_allowed_principal_arns: ${{ vars.S3_ENDPOINT_ALLOWED_PRINCIPAL_ARNS_JSON }}
      TF_VAR_data_lake_bucket_name: ${{ vars.DATA_LAKE_BUCKET_NAME }}
      TF_VAR_glue_assets_bucket_name: ${{ vars.GLUE_ASSETS_BUCKET_NAME }}
      TF_VAR_kms_alias_prefix: ${{ vars.KMS_ALIAS_PREFIX }}
      TF_VAR_github_oidc_provider_arn: ${{ vars.OIDC_PROVIDER_ARN }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_analytics_reader_trusted_principal_arn: ${{ vars.ANALYTICS_READER_TRUSTED_PRINCIPAL_ARN }}
      TF_VAR_redshift_admin_secret_arn: ${{ vars.REDSHIFT_ADMIN_SECRET_ARN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform -chdir=terraform/environments/dev init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform/environments/dev validate

      - name: TFLint
        run: tflint --chdir=terraform/environments/dev

      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7
        with:
          directory: terraform
          quiet: true

      - name: Build speculative plan
        run: terraform -chdir=terraform/environments/dev plan -refresh=false -lock=false -input=false -out=plan.out

      - name: Upload speculative plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-plan
          path: terraform/environments/dev/plan.out
          if-no-files-found: error
          retention-days: 7
