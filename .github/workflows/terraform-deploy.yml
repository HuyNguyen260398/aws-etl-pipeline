name: Terraform deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Plan and apply dev
    runs-on: ubuntu-24.04
    environment: dev
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME }}
      TF_VAR_environment: dev
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_private_subnet_cidrs: ${{ vars.PRIVATE_SUBNET_CIDRS_JSON }}
      TF_VAR_nat_public_subnet_cidr: ${{ vars.NAT_PUBLIC_SUBNET_CIDR }}
      TF_VAR_s3_endpoint_allowed_bucket_arns: ${{ vars.S3_ENDPOINT_ALLOWED_BUCKET_ARNS_JSON }}
      TF_VAR_s3_endpoint_allowed_principal_arns: ${{ vars.S3_ENDPOINT_ALLOWED_PRINCIPAL_ARNS_JSON }}
      TF_VAR_data_lake_bucket_name: ${{ vars.DATA_LAKE_BUCKET_NAME }}
      TF_VAR_glue_assets_bucket_name: ${{ vars.GLUE_ASSETS_BUCKET_NAME }}
      TF_VAR_kms_alias_prefix: ${{ vars.KMS_ALIAS_PREFIX }}
      TF_VAR_github_oidc_provider_arn: ${{ vars.OIDC_PROVIDER_ARN }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_analytics_reader_trusted_principal_arn: ${{ vars.ANALYTICS_READER_TRUSTED_PRINCIPAL_ARN }}
      TF_VAR_redshift_admin_secret_arn: ${{ vars.REDSHIFT_ADMIN_SECRET_ARN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Initialize remote state
        run: >-
          terraform -chdir=terraform/environments/dev init -input=false
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"
          -backend-config="key=${{ vars.TF_STATE_KEY }}"
          -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Plan dev
        run: terraform -chdir=terraform/environments/dev plan -input=false -out=plan.out

      - name: Apply approved dev plan
        run: terraform -chdir=terraform/environments/dev apply -input=false plan.out
